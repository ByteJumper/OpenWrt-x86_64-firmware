# File: .github/workflows/test-gn.yml
# Version: 1.1
# Description: Test if gn package exists and compiles in OpenWrt LEDE

name: Test GN Package

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  test-gn:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python2.7 \
          python3 \
          python3-distutils \
          python3-setuptools \
          rsync \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          ninja-build \
          cmake \
          python3-pyelftools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Check gn package status
      id: check_gn
      run: |
        cd openwrt
        echo "========================================="
        echo "Checking gn package installation status"
        echo "========================================="
        
        # 搜索所有可能的 gn 位置
        echo "Searching for gn directories..."
        find . -type d -name "gn" 2>/dev/null | head -20
        
        echo ""
        echo "Searching for gn Makefiles..."
        find . -name "Makefile" -path "*/gn/*" 2>/dev/null | head -20
        
        # 检查特定路径
        GN_PATHS=(
          "feeds/helloworld/gn"
          "package/feeds/helloworld/gn"
          "package/helloworld/gn"
          "tools/gn"
          "buildtools/gn"
        )
        
        GN_FOUND=""
        for path in "${GN_PATHS[@]}"; do
          if [ -d "$path" ]; then
            GN_FOUND="$path"
            echo "✅ Found gn at: $path"
            break
          fi
        done
        
        if [ -n "$GN_FOUND" ]; then
          echo "gn_exists=true" >> $GITHUB_OUTPUT
          echo "gn_path=$GN_FOUND" >> $GITHUB_OUTPUT
          if [ -f "$GN_FOUND/Makefile" ]; then
            echo "makefile_exists=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "gn_exists=false" >> $GITHUB_OUTPUT
          echo "❌ GN package not found"
        fi
        
        # 检查 ninja
        echo ""
        echo "Ninja version:"
        ninja --version 2>/dev/null || echo "ninja not found"

    - name: Apply gn fix (if gn exists)
      if: steps.check_gn.outputs.gn_exists == 'true'
      run: |
        cd openwrt
        GN_PATH="${{ steps.check_gn.outputs.gn_path }}"
        GN_MAKEFILE="$GN_PATH/Makefile"
        
        if [ -f "$GN_MAKEFILE" ]; then
          echo "Applying fix to $GN_MAKEFILE"
          cp "$GN_MAKEFILE" "$GN_MAKEFILE.bak"
          sed -i 's/+$(NINJA)/ninja/g' "$GN_MAKEFILE"
          sed -i 's/$(NINJA)/ninja/g' "$GN_MAKEFILE"
          echo "Fix applied"
        fi

    - name: Configure OpenWrt
      run: |
        cd openwrt
        echo 'CONFIG_TARGET_x86=y' >> .config
        echo 'CONFIG_TARGET_x86_64=y' >> .config
        echo 'CONFIG_TARGET_x86_64_Generic=y' >> .config
        echo 'CONFIG_DEVEL=y' >> .config
        echo 'CONFIG_PACKAGE_luci=y' >> .config
        make defconfig > /dev/null 2>&1

    - name: Test compile gn package
      id: compile_gn
      working-directory: /workdir/openwrt
      run: |
        echo "========================================="
        echo "Testing gn package compilation"
        echo "========================================="
        
        # 定义要测试的目标
        TARGETS=(
          "package/feeds/helloworld/gn/host/compile"
          "package/helloworld/gn/host/compile"
          "feeds/helloworld/gn/host/compile"
          "tools/gn/compile"
        )
        
        COMPILE_SUCCESS=false
        
        for target in "${TARGETS[@]}"; do
          echo ""
          echo "Testing target: $target"
          echo "-----------------------------------------"
          
          # 检查目标是否存在
          if make -n "$target" 2>&1 | grep -q "No rule to make target"; then
            echo "⚠️ Target does not exist: $target"
            continue
          fi
          
          # 尝试编译
          set +e
          make "$target" -j1 V=s > "gn_compile.log" 2>&1
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Success: $target"
            COMPILE_SUCCESS=true
            echo "successful_target=$target" >> $GITHUB_OUTPUT
            break
          else
            echo "❌ Failed: $target (exit code: $EXIT_CODE)"
            # 显示最后几行错误
            echo "Last 20 lines of output:"
            tail -20 "gn_compile.log"
          fi
        done
        
        if [ "$COMPILE_SUCCESS" = true ]; then
          echo "gn_status=success" >> $GITHUB_OUTPUT
          exit 0
        else
          echo "gn_status=failed" >> $GITHUB_OUTPUT
          echo "❌ All compilation attempts failed"
          exit 1
        fi

    - name: Verify gn binary
      if: steps.compile_gn.outputs.gn_status == 'success'
      run: |
        cd openwrt
        echo "========================================="
        echo "Verifying gn binary"
        echo "========================================="
        
        # 查找 gn 二进制
        find . -name "gn" -type f -executable 2>/dev/null | head -10
        
        # 检查 staging_dir
        if [ -f "staging_dir/host/bin/gn" ]; then
          echo "✅ gn binary found: staging_dir/host/bin/gn"
          ls -lh staging_dir/host/bin/gn
          file staging_dir/host/bin/gn
        elif [ -f "staging_dir/host/bin/gn.exe" ]; then
          echo "✅ gn binary found: staging_dir/host/bin/gn.exe"
        else
          echo "⚠️ gn binary not found in staging_dir"
        fi

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gn-test-logs
        path: |
          /workdir/openwrt/gn_compile.log
          /workdir/openwrt/.config
        retention-days: 7

    - name: Build Summary
      if: always()
      run: |
        echo "## GN Package Test Summary (v1.1)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| GN Package Found | ${{ steps.check_gn.outputs.gn_exists }} |" >> $GITHUB_STEP_SUMMARY
        echo "| GN Compilation | ${{ steps.compile_gn.outputs.gn_status }} |" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ steps.compile_gn.outputs.successful_target }}" ]; then
          echo "| Successful Target | ${{ steps.compile_gn.outputs.successful_target }} |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.check_gn.outputs.gn_exists }}" == "false" ]; then
          echo "### ℹ️ Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GN package was not found in the source tree." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This explains why the original build failed - gn is not a separate package in LEDE." >> $GITHUB_STEP_SUMMARY
          echo "The error might come from another package that depends on gn." >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.compile_gn.outputs.gn_status }}" == "success" ]; then
          echo "### ✅ Test PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GN package compiles successfully." >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Test FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs artifact for details." >> $GITHUB_STEP_SUMMARY
        fi
