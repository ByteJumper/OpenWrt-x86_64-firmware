name: Test GitHub Token Permissions

on:
  workflow_dispatch:
    inputs:
      token_type:
        description: 'Token to test'
        required: true
        default: 'RELEASE_TOKEN'
        type: choice
        options:
          - RELEASE_TOKEN
          - GITHUB_TOKEN

env:
  RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test-token:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Get token value
      id: get_token
      run: |
        if [ "${{ github.event.inputs.token_type }}" == "RELEASE_TOKEN" ]; then
          echo "token=${{ secrets.RELEASE_TOKEN }}" >> $GITHUB_OUTPUT
          echo "token_name=RELEASE_TOKEN" >> $GITHUB_OUTPUT
        else
          echo "token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          echo "token_name=GITHUB_TOKEN" >> $GITHUB_OUTPUT
        fi
    
    - name: Test token basic info
      run: |
        echo "Testing token: ${{ steps.get_token.outputs.token_name }}"
        
        if [ -z "${{ steps.get_token.outputs.token }}" ]; then
          echo "❌ Token is empty or not set!"
          exit 1
        fi
        echo "✅ Token is set"
    
    - name: Test GitHub API authentication
      run: |
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/user)
        
        if [ "$RESPONSE" == "200" ]; then
          echo "✅ Token authentication successful"
          USERNAME=$(curl -s -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
            https://api.github.com/user | jq -r .login)
          echo "Authenticated as: $USERNAME"
        else
          echo "❌ Token authentication failed with status: $RESPONSE"
          exit 1
        fi
    
    - name: Test repository access
      run: |
        REPO="${{ github.repository }}"
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/$REPO)
        
        if [ "$RESPONSE" == "200" ]; then
          echo "✅ Repository access successful"
        else
          echo "❌ Repository access failed with status: $RESPONSE"
          exit 1
        fi
    
    - name: Create test release
      id: create_release
      run: |
        REPO="${{ github.repository }}"
        TEST_TAG="test-token-$(date +%s)"
        
        echo "Creating test release..."
        
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/$REPO/releases \
          -d '{
            "tag_name": "'$TEST_TAG'",
            "name": "Token Test Release",
            "body": "This is a test release to verify token permissions",
            "draft": true,
            "prerelease": true
          }')
        
        if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "✅ Create release permission: SUCCESS"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "test_tag=$TEST_TAG" >> $GITHUB_OUTPUT
        else
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // "Unknown error"')
          echo "❌ Create release permission: FAILED"
          echo "Error: $ERROR_MSG"
          exit 1
        fi
    
    - name: Test upload asset permission
      if: steps.create_release.outputs.release_id != ''
      run: |
        REPO="${{ github.repository }}"
        RELEASE_ID="${{ steps.create_release.outputs.release_id }}"
        
        echo "Testing upload asset permission..."
        
        # 创建测试文件
        echo "This is a test file - $(date)" > test-asset.txt
        
        # 上传文件到刚创建的 release
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Content-Type: application/octet-stream" \
          "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=test-asset.txt" \
          --data-binary @test-asset.txt)
        
        if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
          echo "✅ Upload asset permission: SUCCESS"
          ASSET_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "asset_id=$ASSET_ID" >> $GITHUB_OUTPUT
        else
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // "Unknown error"')
          echo "❌ Upload asset permission: FAILED"
          echo "Error: $ERROR_MSG"
          exit 1
        fi
    
    - name: Delete test asset
      if: steps.create_release.outputs.release_id != ''
      run: |
        if [ -n "${{ steps.upload_asset.outputs.asset_id }}" ]; then
          ASSET_ID="${{ steps.upload_asset.outputs.asset_id }}"
          REPO="${{ github.repository }}"
          
          curl -s -X DELETE \
            -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID
          
          echo "✅ Test asset deleted"
        fi
    
    - name: Delete test release
      if: always() && steps.create_release.outputs.release_id != ''
      run: |
        RELEASE_ID="${{ steps.create_release.outputs.release_id }}"
        REPO="${{ github.repository }}"
        
        # 先删除对应的 tag（可选）
        TAG_NAME="${{ steps.create_release.outputs.test_tag }}"
        
        # 删除 release
        curl -s -X DELETE \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/$REPO/releases/$RELEASE_ID
        
        # 删除 tag
        curl -s -X DELETE \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/$REPO/git/refs/tags/$TAG_NAME
        
        echo "✅ Test release and tag cleaned up"
    
    - name: Test token scopes
      run: |
        echo "Checking token scopes..."
        
        RESPONSE=$(curl -s -I \
          -H "Authorization: token ${{ steps.get_token.outputs.token }}" \
          https://api.github.com/user)
        
        SCOPES=$(echo "$RESPONSE" | grep -i "x-oauth-scopes" | cut -d' ' -f2-)
        
        if [ -n "$SCOPES" ]; then
          echo "Token scopes: $SCOPES"
          
          if echo "$SCOPES" | grep -q "repo"; then
            echo "✅ repo scope: present (required for releases)"
          else
            echo "❌ repo scope: missing! Token needs 'repo' scope"
          fi
          
          if echo "$SCOPES" | grep -q "workflow"; then
            echo "✅ workflow scope: present"
          else
            echo "⚠️  workflow scope: missing (optional)"
          fi
        else
          echo "⚠️  GITHUB_TOKEN does not show scopes (this is normal)"
          echo "GITHUB_TOKEN has limited permissions by default"
        fi
    
    - name: Generate final report
      if: always()
      run: |
        echo "========================================="
        echo "Token Test Report"
        echo "========================================="
        echo "Token Name: ${{ steps.get_token.outputs.token_name }}"
        echo "Test Status: ${{ job.status }}"
        echo "========================================="
        
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅✅✅ Token has ALL required permissions! ✅✅✅"
          echo ""
          echo "This token can be used in your OpenWrt build workflow"
          echo "for creating releases and uploading firmware files."
        else
          echo "❌❌❌ Token has INSUFFICIENT permissions! ❌❌❌"
          echo ""
          echo "Solution for RELEASE_TOKEN:"
          echo "1. Go to: GitHub Settings → Developer settings → Personal access tokens"
          echo "2. Click 'Generate new token (classic)'"
          echo "3. Set expiration: No expiration"
          echo "4. Select scopes: ✅ repo (all sub-options)"
          echo "5. Generate and copy the token"
          echo "6. Add to repository secrets as RELEASE_TOKEN"
          echo ""
          echo "Solution for GITHUB_TOKEN:"
          echo "GITHUB_TOKEN is automatically provided but has limitations."
          echo "For long-running builds, create a PAT with 'repo' scope instead."
        fi
