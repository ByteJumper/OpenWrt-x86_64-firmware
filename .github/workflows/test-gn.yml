# File: .github/workflows/test-gn.yml
# Description: Test gn package compilation with accurate checking and verification

name: Test GN Package

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  test-gn:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python2.7 \
          python3 \
          python3-distutils \
          python3-setuptools \
          rsync \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          ninja-build \
          cmake \
          python3-pyelftools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Check gn package status
      id: check_gn
      run: |
        cd openwrt
        echo "========================================="
        echo "Checking gn package installation status"
        echo "========================================="
        
        # 定义可能的路径
        GN_PATHS=(
          "feeds/helloworld/gn"
          "package/feeds/helloworld/gn"
          "package/helloworld/gn"
        )
        
        GN_FOUND=""
        for path in "${GN_PATHS[@]}"; do
          if [ -d "$path" ]; then
            GN_FOUND="$path"
            echo "Found gn at: $path"
            break
          fi
        done
        
        if [ -n "$GN_FOUND" ]; then
          echo "gn_exists=true" >> $GITHUB_OUTPUT
          echo "gn_path=$GN_FOUND" >> $GITHUB_OUTPUT
          echo "✅ GN package found at: $GN_FOUND"
          
          # 检查 Makefile 是否存在
          if [ -f "$GN_FOUND/Makefile" ]; then
            echo "Makefile exists at: $GN_FOUND/Makefile"
            echo "makefile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Makefile not found in $GN_FOUND"
            echo "makefile_exists=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "gn_exists=false" >> $GITHUB_OUTPUT
          echo "❌ GN package not found in any expected location"
          echo ""
          echo "Debug: Searching for gn directories..."
          find . -type d -name "gn" 2>/dev/null | head -10
        fi
        
        # 检查 ninja 是否安装
        echo ""
        echo "Checking ninja installation:"
        which ninja || echo "ninja not in PATH"
        ninja --version 2>/dev/null || echo "ninja version check failed"

    - name: Apply gn fix (if needed)
      if: steps.check_gn.outputs.gn_exists == 'true'
      run: |
        cd openwrt
        GN_PATH="${{ steps.check_gn.outputs.gn_path }}"
        GN_MAKEFILE="$GN_PATH/Makefile"
        
        if [ -f "$GN_MAKEFILE" ]; then
          echo "========================================="
          echo "Applying fix to gn Makefile"
          echo "========================================="
          
          # 显示原始内容的相关行
          echo "Original content (relevant lines):"
          grep -n -E "(NINJA|ninja)" "$GN_MAKEFILE" || echo "No NINJA related lines found"
          
          # 备份
          cp "$GN_MAKEFILE" "$GN_MAKEFILE.bak"
          
          # 应用修复
          sed -i 's/+$(NINJA)/ninja/g' "$GN_MAKEFILE"
          sed -i 's/$(NINJA)/ninja/g' "$GN_MAKEFILE"
          
          echo ""
          echo "Modified content:"
          grep -n -E "(NINJA|ninja)" "$GN_MAKEFILE" || echo "No changes applied"
          
          echo ""
          echo "✅ Fix applied to $GN_MAKEFILE"
        else
          echo "⚠️ Makefile not found, cannot apply fix"
        fi

    - name: Configure OpenWrt
      run: |
        cd openwrt
        
        # 使用 echo 逐行添加配置（避免 heredoc 问题）
        echo 'CONFIG_TARGET_x86=y' >> .config
        echo 'CONFIG_TARGET_x86_64=y' >> .config
        echo 'CONFIG_TARGET_x86_64_Generic=y' >> .config
        echo 'CONFIG_DEVEL=y' >> .config
        echo 'CONFIG_BUSYBOX_CUSTOM=y' >> .config
        echo 'CONFIG_BUSYBOX_CONFIG_MOUNT=y' >> .config
        echo 'CONFIG_PACKAGE_luci=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-ssr-plus=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-openclash=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-passwall=y' >> .config
        
        echo "Running defconfig..."
        make defconfig > /dev/null 2>&1
        
        echo "Config summary:"
        grep -E "CONFIG_TARGET|CONFIG_PACKAGE_luci" .config | head -10

    - name: Test compile gn package
      id: compile_gn
      working-directory: /workdir/openwrt
      run: |
        echo "========================================="
        echo "Starting GN package compilation test"
        echo "========================================="
        
        # 记录开始时间
        START_TIME=$(date +%s)
        
        # 尝试多个可能的 make 目标
        MAKE_TARGETS=(
          "package/feeds/helloworld/gn/host/compile"
          "package/helloworld/gn/host/compile"
          "feeds/helloworld/gn/host/compile"
        )
        
        COMPILE_SUCCESS=false
        for target in "${MAKE_TARGETS[@]}"; do
          echo ""
          echo "Trying: make $target -j1 V=s"
          echo "-----------------------------------------"
          
          # 使用 || true 避免脚本退出，但捕获真实结果
          set +e
          make "$target" -j1 V=s 2>&1 | tee "gn_compile_${target//\//_}.log"
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Compilation succeeded with target: $target"
            COMPILE_SUCCESS=true
            echo "successful_target=$target" >> $GITHUB_OUTPUT
            break
          else
            echo "❌ Compilation failed with target: $target (exit code: $EXIT_CODE)"
          fi
        done
        
        # 计算编译时间
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Compilation duration: ${DURATION} seconds"
        
        if [ "$COMPILE_SUCCESS" = true ]; then
          echo "gn_status=success" >> $GITHUB_OUTPUT
        else
          echo "gn_status=failed" >> $GITHUB_OUTPUT
          echo "❌ All compilation attempts failed"
          exit 1
        fi

    - name: Verify gn binary
      if: steps.compile_gn.outputs.gn_status == 'success'
      id: verify_gn
      run: |
        cd openwrt
        echo "========================================="
        echo "Verifying GN binary installation"
        echo "========================================="
        
        # 查找 gn 二进制文件
        echo "Searching for gn binary..."
        GN_BINARIES=$(find . -name "gn" -type f 2>/dev/null | grep -v ".build" | head -10)
        
        if [ -n "$GN_BINARIES" ]; then
          echo "$GN_BINARIES"
          echo ""
          
          # 检查 staging_dir 中的二进制
          for bin in $GN_BINARIES; do
            if echo "$bin" | grep -q "staging_dir.*/bin/gn"; then
              echo "✅ GN binary found in staging_dir: $bin"
              file "$bin"
              echo "Binary size: $(ls -lh "$bin" | awk '{print $5}')"
              echo "gn_binary_verified=true" >> $GITHUB_OUTPUT
              break
            fi
          done
        else
          echo "⚠️ No gn binary found in expected locations"
          echo "gn_binary_verified=false" >> $GITHUB_OUTPUT
          
          # 搜索所有 gn 文件
          echo ""
          echo "Full search for gn files:"
          find . -name "*gn*" -type f 2>/dev/null | grep -v ".git" | head -20
        fi

    - name: Upload logs (if compilation failed)
      if: steps.compile_gn.outputs.gn_status != 'success'
      uses: actions/upload-artifact@v4
      with:
        name: gn-compile-failure-logs
        path: |
          /workdir/openwrt/gn_compile*.log
          /workdir/openwrt/logs/
          /workdir/openwrt/tmp/
        retention-days: 7

    - name: Upload verification logs (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gn-test-logs
        path: |
          /workdir/openwrt/gn_compile*.log
          /workdir/openwrt/.config
        retention-days: 3

    - name: Show error details (if failed)
      if: steps.compile_gn.outputs.gn_status != 'success'
      run: |
        echo "========================================="
        echo "GN Compilation Failed - Error Details"
        echo "========================================="
        
        # 查找最新的日志文件
        LOG_FILE=$(ls -t /workdir/openwrt/gn_compile*.log 2>/dev/null | head -1)
        
        if [ -f "$LOG_FILE" ]; then
          echo "Last 50 lines of error log ($LOG_FILE):"
          echo "-----------------------------------------"
          tail -50 "$LOG_FILE"
        else
          echo "No log file found"
        fi

    - name: Build Summary
      if: always()
      run: |
        echo "## GN Package Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| GN Package Found | ${{ steps.check_gn.outputs.gn_exists }} | Path: ${{ steps.check_gn.outputs.gn_path }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Makefile Exists | ${{ steps.check_gn.outputs.makefile_exists }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "| GN Compilation | ${{ steps.compile_gn.outputs.gn_status }} | Target: ${{ steps.compile_gn.outputs.successful_target }} |" >> $GITHUB_STEP_SUMMARY
        echo "| GN Binary Verified | ${{ steps.verify_gn.outputs.gn_binary_verified }} | - |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.compile_gn.outputs.gn_status }}" == "success" ]; then
          echo "### ✅ Test PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The gn package compilation succeeded and binary has been verified." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. The fix has been applied during this test" >> $GITHUB_STEP_SUMMARY
          echo "2. Run the main 'Test Builter' workflow for full firmware compilation" >> $GITHUB_STEP_SUMMARY
          echo "3. Consider adding the same fix to diy-part2.sh for permanent solution" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Test FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details. Download the 'gn-compile-failure-logs' artifact for full logs." >> $GITHUB_STEP_SUMMARY
        fi
